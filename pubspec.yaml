name: study_flow
description: A study planning app for Android and Windows.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  connectivity_plus: ^7.0.0
  file_selector: ^1.1.0
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  flutter_local_notifications: ^21.0.0
  flutter_riverpod: ^2.6.1
  intl: ^0.20.2
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  package_info_plus: ^9.0.0
  path_provider: ^2.1.5
  supabase_flutter: ^2.12.0
  timezone: ^0.11.0
  url_launcher: ^6.3.2
  uuid: ^4.5.1
  workmanager: ^0.9.0+3

dev_dependencies:
  build_runner: ^2.4.13
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  isar_generator: ^3.1.0+1
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  windows:
    generate: true
  image_path: assets/branding/app_icon_source.png
  adaptive_icon_background: "#081B3A"
  adaptive_icon_foreground: assets/branding/app_icon_android_foreground.png
  adaptive_icon_foreground_inset: 4
